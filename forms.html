<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>shibam webpage</title>
      <style>
        body{
            background-color:rgb(0, 221, 255);
        }
      </style>
</head>
<body>
    <h1><b><i>Shibam Form :)</i></b></h1>
    <img src="photos/pic.jpeg" height=400px widthht=400px alt="Shibam Das">     
         
    <fieldset>
        <legend><h1><b>Personal Information</b></h1></legend>
        <label for="name">Name : </label>
        <input type ="text" id="name required"><br><br>
        <label for="phone">Phone no. : </label>
        <input type ="tel" id="phone required"><br><br>
        <label for="email">E-mail : </label>
        <input type ="email" id="email required"><br><br>
        <label for="dob">Date of Birth (DOB) : </label>
        <input type ="date" id="dob required"><br><br>
        <label for="age">Age : </label>
        <input type ="number" id="age required"><br><br>
        <label for="contact-method">Contact on : </label><br>
        <input type="radio"id=contact-method value="email">
        <label for ="contact-email">E-mail</label><br>
        <input type="radio"id=contact-method value="phone">
        <label for ="contact-phone">Phone</label><br><br>
        <label for="website">My Web : </label>
        <input type="url" id="website" name="website" required><br><br>
        <label for = "password">Password : </label>
        <input type = "password" id = "password" name = "password" required><br><br>
        <label for = "theme"> Theme : </label>
        <input type ="theme" id = "theme" name="theme" required><br><br>
        <label for = "file">Profile pic : </label>
        <input type = "file" id = "pic" name="pic" required ><br><br>
        <label for = "city">Select City : </label>
        <select name ="city" id = "city">
            <option value = "Silchar">Silchar</option><br>
            <option value = "guwahati">Guwahati</option><br>
            <option value = "Mumbai">Mumbai</option><br>
        </select>
    </fieldset>
</body>
</html>
